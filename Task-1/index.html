<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A sleek, modern calculator with addition, subtraction, multiplication, and division operations.">
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <main class="calculator-wrapper">
    <header class="calc-header">
      <h1 class="calc-title">CALCULATOR</h1>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </header>

    <div class="calculator" id="calculator">
      <!-- Display -->
      <div class="display" id="display">
        <div class="display-expression" id="display-expression"></div>
        <div class="display-current" id="display-current">0</div>
      </div>

      <!-- Button Grid -->
      <div class="buttons-grid">
        <!-- Row 1 -->
        <button class="btn btn-function" id="btn-clear" data-action="clear">AC</button>
        <button class="btn btn-function" id="btn-sign" data-action="sign">+/−</button>
        <button class="btn btn-function" id="btn-percent" data-action="percent">%</button>
        <button class="btn btn-operator" id="btn-divide" data-action="operator" data-value="/">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-number" id="btn-7" data-action="number" data-value="7">7</button>
        <button class="btn btn-number" id="btn-8" data-action="number" data-value="8">8</button>
        <button class="btn btn-number" id="btn-9" data-action="number" data-value="9">9</button>
        <button class="btn btn-operator" id="btn-multiply" data-action="operator" data-value="*">×</button>

        <!-- Row 3 -->
        <button class="btn btn-number" id="btn-4" data-action="number" data-value="4">4</button>
        <button class="btn btn-number" id="btn-5" data-action="number" data-value="5">5</button>
        <button class="btn btn-number" id="btn-6" data-action="number" data-value="6">6</button>
        <button class="btn btn-operator" id="btn-subtract" data-action="operator" data-value="-">−</button>

        <!-- Row 4 -->
        <button class="btn btn-number" id="btn-1" data-action="number" data-value="1">1</button>
        <button class="btn btn-number" id="btn-2" data-action="number" data-value="2">2</button>
        <button class="btn btn-number" id="btn-3" data-action="number" data-value="3">3</button>
        <button class="btn btn-operator" id="btn-add" data-action="operator" data-value="+">+</button>

        <!-- Row 5 -->
        <button class="btn btn-number btn-zero" id="btn-0" data-action="number" data-value="0">0</button>
        <button class="btn btn-number" id="btn-decimal" data-action="decimal" data-value=".">.</button>
        <button class="btn btn-equals" id="btn-equals" data-action="equals">=</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
